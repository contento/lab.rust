name: Multi-Project Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [hello_cargo] 
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: ${{ matrix.project }} 
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.project }} on ${{ matrix.os }}
        run: |
          echo "Building in ${{ matrix.project }} on ${{ matrix.os }}"
          cargo build --verbose
      - name: Run tests ${{ matrix.project }} on ${{ matrix.os }}
        run: |
          echo "Testing in ${{ matrix.project }} on ${{ matrix.os }}"
          cargo test --verbose
